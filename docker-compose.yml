version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - OLLAMA_BASE_URL=http://ollama:11434
      - COMFYUI_URL=http://comfyui:8188
      - FFMPEG_PATH=/usr/bin/ffmpeg
    depends_on:
      - ollama
      - comfyui

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama

  comfyui:
    image: ai-dock/comfyui:latest
    ports:
      - "8188:8188"
    volumes:
      - comfyuidata:/workspace/ComfyUI/output

volumes:
  ollamadata:
  comfyuidata:
